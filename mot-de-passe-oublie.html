<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mot de passe oublié - Rahti</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f0f4f8; margin: 0; padding: 0; height: 100vh; display: flex; justify-content: center; align-items: center; }
        .auth-container { background: white; padding: 3rem; border-radius: 20px; box-shadow: 0 15px 50px rgba(0,0,0,0.1); width: 100%; max-width: 450px; text-align: center; }
        .brand { font-size: 2.2rem; font-weight: 900; background: linear-gradient(135deg, #0077b6, #00b4d8); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 2rem; }
        .form-group { margin-bottom: 1.5rem; text-align: left; }
        .form-group label { display: block; font-weight: 600; margin-bottom: 0.5rem; color: #2b2d42; }
        .form-group input { width: 100%; padding: 0.9rem 1.1rem; border: 2px solid #edf2f7; border-radius: 10px; font-family: 'Inter'; font-size: 1rem; transition: all 0.3s; box-sizing: border-box; }
        .form-group input:focus { border-color: #3fbad9; outline: none; box-shadow: 0 0 0 4px rgba(63, 186, 217, 0.15); }
        .btn-submit { width: 100%; padding: 1.1rem; background-color: #0077b6; color: white; border: none; border-radius: 10px; font-size: 1.1rem; font-weight: 800; cursor: pointer; transition: 0.3s; margin-top: 1rem; letter-spacing: 0.5px; }
        .btn-submit:hover { background-color: #03045e; transform: translateY(-2px); }
        .auth-links { margin-top: 2rem; color: #718096; border-top: 1px solid #edf2f7; padding-top: 1.5rem; }
        .auth-links a { color: #0077b6; text-decoration: none; font-weight: 700; transition: 0.2s; }
        .auth-links a:hover { color: #00b4d8; text-decoration: underline; }
        .alert-info { background: #f0f9ff; color: #0369a1; padding: 1rem; border-radius: 10px; font-size: 0.9rem; margin-bottom: 2rem; border-left: 4px solid #0ea5e9; text-align: left; }
    </style>
</head>
<body>
    <div class="auth-container">
        <a href="home.html" style="text-decoration: none;"><div class="brand">RAHTI</div></a>
        <h2 style="color: #2b2d42; margin-bottom: 1rem;">Récupération de compte</h2>
        <div class="alert-info">
            Pour réinitialiser votre mot de passe, veuillez confirmer votre identité en saisissant votre email et votre nom complet.
        </div>
        
        <form id="reset-form" autocomplete="off">
            <div class="form-group">
                <label for="email">Adresse Email</label>
                <input type="email" id="email" name="email" placeholder="votre@email.com" required>
            </div>
            <div class="form-group">
                <label for="name">Nom Complet</label>
                <input type="text" id="name" name="name" placeholder="Tel qu'inscrit" required>
            </div>
            <div class="form-group">
                <label for="newPassword">Nouveau mot de passe</label>
                <input type="password" id="newPassword" name="newPassword" placeholder="••••••••" required minlength="6">
            </div>
            <button type="submit" class="btn-submit">Réinitialiser le mot de passe</button>
        </form>

        <div id="notification-container" style="position: fixed; top: 20px; right: 20px; z-index: 9999;"></div>

        <div class="auth-links">
            <p><a href="connexion.html">← Retour à la connexion</a></p>
        </div>
    </div>

    <script>
        function showNotification(message, type = 'success') {
            const container = document.getElementById('notification-container');
            const toast = document.createElement('div');
            const bgColor = type === 'success' ? '#2a9d8f' : (type === 'error' ? '#e63946' : '#3fbad9');
            
            toast.style.cssText = `
                background: ${bgColor}; color: white; padding: 1.1rem 2rem; border-radius: 12px;
                box-shadow: 0 10px 30px rgba(0,0,0,0.15); margin-bottom: 12px; font-weight: 700;
                transform: translateX(120%); transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
                display: flex; align-items: center; gap: 12px;
            `;
            
            const icon = type === 'success' ? '✅' : (type === 'error' ? '❌' : 'ℹ️');
            toast.innerHTML = `<span>${icon}</span> <span>${message}</span>`;
            
            container.appendChild(toast);
            setTimeout(() => { toast.style.transform = 'translateX(0)'; }, 10);
            setTimeout(() => {
                toast.style.transform = 'translateX(120%)';
                setTimeout(() => toast.remove(), 400);
            }, 4000);
        }

        document.getElementById('reset-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData.entries());

            try {
                const response = await fetch('/api/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                const result = await response.json();

                if (response.ok) {
                    showNotification(result.message);
                    setTimeout(() => { window.location.href = 'connexion.html'; }, 2500);
                } else {
                    showNotification(result.message, "error");
                }
            } catch (error) {
                showNotification("Une erreur s'est produite. Veuillez réessayer.", "error");
            }
        });
    </script>
</body>
</html>
